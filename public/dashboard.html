<!doctype html>

<html>
  <head>
    <title>Task Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Task Dashboard</h1>
        <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
      </div>
      <div class="form-card">
        <form id="todoForm">
          <label for="dueDate">Due Date</label>
          <input type="date" id="dueDate" />
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="To-do" />
          <label for="description">Description</label>
          <textarea id="description" placeholder="To-do description"></textarea>
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>

          <button type="submit" class="btn-primary">Add todo</button>
        </form>
      </div>
      <div class="board">
        <section class="column">
          <h2>Pending</h2>
          <div id="pendingList"></div>
        </section>
        <section class="column">
          <h2>Completed</h2>
          <div id="completedList"></div>
        </section>
      </div>
    </div>
    <div id="modal" style="display: none">
      <div class="modal-box">
        <h2>Edit Note</h2>
        <input type="date" id="editDueDate" />
        <input type="text" id="editTitle" placeholder="title" />
        <textarea id="editDescription" placeholder="description"></textarea>
        <select id="editPriority">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
        <div class="modal-buttons">
          <button onclick="saveTodo()" class="btn-primary">Save</button>
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
